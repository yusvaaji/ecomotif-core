openapi: 3.0.3
info:
  title: Ecomotif API
  description: |
    Spesifikasi OpenAPI diselaraskan dengan `docs/API.md`.
    Server `url: /api` — path di bawah ini **tanpa** prefix `/api` kedua.
    **JWT** (`auth:api`): header `Authorization: Bearer <token>`.
    **Sanctum** (`/v1/*`): header `Authorization: Bearer <sanctum_token>`.
  version: "1.2.0"
  externalDocs:
    description: Parameter lengkap & catatan implementasi
    url: ./API.md

servers:
  - url: /api
    description: Relatif ke origin aplikasi (APP_URL)

tags:
  - name: Public
  - name: KataKata
    description: Kutipan teks (bukan estimasi harga; beda dari tag Quotes)
  - name: Quotes
  - name: Auth
  - name: User
  - name: Garage
  - name: Community
  - name: Wallet
  - name: Dealer
  - name: Application
  - name: Profile
  - name: Payment
  - name: Subscription
  - name: Mediator
  - name: ShowroomPartner
  - name: Marketing
  - name: Car
  - name: CompareList
  - name: KYC
  - name: Contact
  - name: v1

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorMessage:
      type: object
      properties:
        message:
          type: string

    KataKataItem:
      type: object
      required:
        - id
        - text
      properties:
        id:
          type: integer
        text:
          type: string
        author:
          type: string
          nullable: true
        locale:
          type: string
          description: id, en, atau mixed (jika ada di config)
          enum: [id, en, mixed]

    ServiceBookingCreate:
      type: object
      required:
        - garage_id
        - garage_service_id
        - service_type
        - booking_date
        - booking_time
        - customer_name
        - customer_phone
      properties:
        garage_id:
          type: integer
        garage_service_id:
          type: integer
        service_type:
          type: string
          enum: [walk_in, home_service]
        booking_date:
          type: string
          format: date
        booking_time:
          type: string
          description: Waktu (string, mis. "09:00" atau format yang diterima backend)
        customer_name:
          type: string
        customer_phone:
          type: string
        customer_address:
          type: string
          description: Wajib jika service_type = home_service
        vehicle_brand:
          type: string
        vehicle_model:
          type: string
        vehicle_year:
          type: string
        vehicle_plate:
          type: string
        notes:
          type: string

    CommunityCreate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string
        location:
          type: string
        privacy:
          type: string
          enum: [public, private]

    CommunityPostCreate:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          maxLength: 5000
        image:
          type: string
          format: binary

    CommentCreate:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          maxLength: 2000

    RegisterBuyer:
      type: object
      required: [name, email, password, password_confirmation]
      properties:
        name: { type: string }
        email: { type: string, format: email }
        password: { type: string }
        password_confirmation: { type: string }

    RegisterSeller:
      allOf:
        - $ref: "#/components/schemas/RegisterBuyer"
        - type: object
          required: [phone, address, terms_accepted, subscription_plan_id]
          properties:
            phone: { type: string }
            address: { type: string }
            subscription_plan_id:
              type: integer
              description: ID baris subscription_plans (status active) — paket mitra saat daftar
            terms_accepted:
              type: boolean
              description: Harus true (setuju syarat)
            showroom_category: { type: string, description: Kategori showroom }
            showroom_type: { type: string, description: Jenis showroom }
            latitude: { type: number }
            longitude: { type: number }
            pic_name: { type: string, description: Nama PIC showroom }
            pic_email: { type: string, format: email }
            pic_phone: { type: string }
            invitation_code: { type: string }
            payment_proof:
              type: string
              format: binary
              description: multipart — bukti pembayaran
            business_photo:
              type: string
              format: binary
              description: multipart — foto showroom

    RegisterGarage:
      allOf:
        - $ref: "#/components/schemas/RegisterSeller"
        - type: object
          properties:
            garage_services:
              type: string
              description: Teks layanan bengkel (disarankan); disimpan di merchant_profiles.garage_services_description
            specialization: { type: string, description: Alias ringkas; ikut mengisi users.specialization (max 255) }
            garage_category: { type: string, description: Kategori bengkel }
            latitude: { type: number }
            longitude: { type: number }

    QuoteRentalRequest:
      type: object
      required: [car_id, pickup_location, return_location, pickup_date, return_date]
      properties:
        car_id: { type: integer }
        pickup_location: { type: integer, description: city id }
        return_location: { type: integer, description: city id }
        pickup_date: { type: string, format: date }
        return_date: { type: string, format: date }

    QuoteGarageRequest:
      type: object
      required: [garage_id, garage_service_ids]
      properties:
        garage_id: { type: integer }
        garage_service_ids:
          type: array
          items: { type: integer }

    GuestServiceBooking:
      type: object
      required:
        - garage_id
        - garage_service_id
        - service_type
        - booking_date
        - booking_time
        - customer_name
        - customer_phone
      properties:
        garage_id: { type: integer }
        garage_service_id: { type: integer }
        service_type: { type: string, enum: [walk_in, home_service] }
        booking_date: { type: string, format: date }
        booking_time: { type: string }
        customer_name: { type: string }
        customer_phone: { type: string }
        customer_address: { type: string }
        vehicle_brand: { type: string }
        vehicle_model: { type: string }
        vehicle_year: { type: string }
        vehicle_plate: { type: string }
        notes: { type: string }

    RegisterSales:
      allOf:
        - $ref: "#/components/schemas/RegisterBuyer"
        - type: object
          required: [phone, address, sales_partner_type, partner_id]
          properties:
            phone: { type: string }
            address: { type: string }
            sales_partner_type: { type: string, enum: [dealer, garage] }
            partner_id: { type: integer, description: users.id dari mitra dealer/garage }

    RegisterMediator:
      allOf:
        - $ref: "#/components/schemas/RegisterBuyer"
        - type: object
          required: [phone, address]
          properties:
            phone: { type: string }
            address: { type: string }
            showroom_id: { type: integer }

    CalculatorInstallment:
      type: object
      required: [car_price, down_payment]
      properties:
        car_price: { type: number, minimum: 0 }
        down_payment: { type: number, minimum: 0 }
        tenure_months: { type: integer, minimum: 12, maximum: 60 }
        interest_rate: { type: number, minimum: 0, maximum: 100 }

    PaymentCapability:
      type: object
      required: [monthly_income, monthly_expenses, existing_loans, car_price]
      properties:
        monthly_income: { type: number, minimum: 0 }
        monthly_expenses: { type: number, minimum: 0 }
        existing_loans: { type: number, minimum: 0 }
        car_price: { type: number, minimum: 0 }
        tenure_months: { type: integer, minimum: 12, maximum: 60 }

    RentalPaymentQuote:
      type: object
      required: [car_id, pickup_location, return_location, pickup_date, return_date, number_of_day]
      properties:
        car_id: { type: integer }
        pickup_location: { type: integer, description: city id }
        return_location: { type: integer, description: city id }
        pickup_date: { type: string, format: date }
        return_date: { type: string, format: date }
        number_of_day: { type: number }

    ApplicationSubmit:
      type: object
      required: [car_id, down_payment, installment_amount]
      properties:
        car_id: { type: integer }
        down_payment: { type: number, minimum: 0 }
        installment_amount: { type: number, minimum: 0 }
        showroom_id: { type: integer }

    MediatorApplicationCreate:
      type: object
      required: [consumer_name, consumer_email, consumer_phone, car_id, down_payment, installment_amount]
      properties:
        consumer_name: { type: string }
        consumer_email: { type: string, format: email }
        consumer_phone: { type: string }
        car_id: { type: integer }
        down_payment: { type: number, minimum: 0 }
        installment_amount: { type: number, minimum: 0 }
        showroom_id: { type: integer }

    ProfileUpdate:
      type: object
      required: [name, email, phone, address]
      properties:
        name: { type: string }
        email: { type: string }
        phone: { type: string }
        address: { type: string, maxLength: 220 }
        designation: { type: string }
        date_of_birth: { type: string, format: date }
        gender: { type: string }
        latitude: { type: number }
        longitude: { type: number }
        image: { type: string, format: binary }
        banner_image: { type: string, format: binary }

    StripeCardBody:
      type: object
      required: [card_number, year, month, cvc]
      properties:
        card_number: { type: string }
        year: { type: string }
        month: { type: string }
        cvc: { type: string }

    CarBasicCreate:
      type: object
      required: [brand_id, title, slug, description, condition, vehicle_type, purpose, regular_price]
      properties:
        brand_id: { type: integer }
        title: { type: string }
        slug: { type: string }
        description: { type: string }
        condition: { type: string, enum: [used, new] }
        vehicle_type: { type: string, enum: [car, motorcycle] }
        purpose: { type: string, enum: [Rent, Sale] }
        regular_price: { type: number }
        offer_price: { type: number }
        seo_title: { type: string }
        seo_description: { type: string }

    ReviewCreate:
      type: object
      required: [rating, comment, car_id, "g-recaptcha-response"]
      properties:
        rating: { type: number }
        comment: { type: string }
        car_id: { type: integer }
        "g-recaptcha-response": { type: string }

paths:
  /website-setup:
    get:
      tags: [Public]
      summary: Setup website + bahasa + mata uang
      parameters:
        - in: query
          name: lang_code
          schema: { type: string }
      responses:
        "200": { description: OK }

  /:
    get:
      tags: [Public]
      summary: Home (slider, merek, mobil, dealer)
      responses:
        "200": { description: OK }

  /all-brands:
    get:
      tags: [Public]
      summary: Daftar merek
      responses:
        "200": { description: OK }

  /listings-filter-option:
    get:
      tags: [Public]
      summary: Opsi filter listing
      parameters:
        - in: query
          name: country
          schema: { type: string }
      responses:
        "200": { description: OK }

  /listings:
    get:
      tags: [Public]
      summary: Daftar listing mobil
      parameters:
        - { in: query, name: country_id, schema: { type: integer } }
        - { in: query, name: location, schema: { type: string } }
        - { in: query, name: search, schema: { type: string } }
        - { in: query, name: showroom_id, schema: { type: integer } }
        - in: query
          name: brands
          style: form
          explode: true
          schema:
            type: array
            items: { type: integer }
        - in: query
          name: condition
          style: form
          explode: true
          schema:
            type: array
            items: { type: string }
        - in: query
          name: purpose
          style: form
          explode: true
          schema:
            type: array
            items: { type: string }
      responses:
        "200": { description: OK }

  /listing/{id}:
    get:
      tags: [Public]
      summary: Detail listing
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: OK }
        "403": { description: Not found }

  /terms-conditions:
    get:
      tags: [Public]
      responses:
        "200": { description: OK }

  /privacy-policy:
    get:
      tags: [Public]
      responses:
        "200": { description: OK }

  /dealers:
    get:
      tags: [Public, Dealer]
      summary: Daftar dealer
      parameters:
        - { in: query, name: search, schema: { type: string } }
        - { in: query, name: location, schema: { type: string } }
        - { in: query, name: min_rating, schema: { type: number } }
        - { in: query, name: lat, schema: { type: number } }
        - { in: query, name: lng, schema: { type: number } }
        - { in: query, name: radius_km, schema: { type: number, default: 25 } }
      responses:
        "200": { description: OK }

  /dealers-filter-option:
    get:
      tags: [Public, Dealer]
      responses:
        "200": { description: OK }

  /dealer/{slug}:
    get:
      tags: [Public, Dealer]
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /showrooms:
    get:
      tags: [Public, Dealer]
      summary: Pilih showroom (dealer)
      parameters:
        - { in: query, name: search, schema: { type: string } }
        - { in: query, name: location, schema: { type: string } }
        - { in: query, name: min_rating, schema: { type: number } }
        - { in: query, name: lat, schema: { type: number } }
        - { in: query, name: lng, schema: { type: number } }
        - { in: query, name: radius_km, schema: { type: number } }
      responses:
        "200": { description: OK }

  /join-as-dealer:
    get:
      tags: [Public]
      summary: Redirect gabung dealer (web)
      responses:
        "302": { description: Redirect }

  /language-switcher:
    get:
      tags: [Public]
      parameters:
        - in: query
          name: lang_code
          required: true
          schema: { type: string }
      responses:
        "302": { description: Redirect }

  /currency-switcher:
    get:
      tags: [Public]
      parameters:
        - in: query
          name: currency_code
          required: true
          schema: { type: string }
      responses:
        "302": { description: Redirect }

  /cities-by-country/{id}:
    get:
      tags: [Public]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: OK }

  /send-message-to-dealer/{id}:
    post:
      tags: [Public, Contact]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
          description: User id dealer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, subject, message]
              properties:
                name: { type: string }
                email: { type: string }
                subject: { type: string }
                message: { type: string }
                phone: { type: string }
                "g-recaptcha-response": { type: string }
      responses:
        "200": { description: OK }

  /calculate-installment:
    post:
      tags: [Public]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalculatorInstallment"
      responses:
        "200": { description: OK }
        "403": { description: Validasi bisnis }

  /calculate-payment-capability:
    post:
      tags: [Public]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentCapability"
      responses:
        "200": { description: OK }

  /calculator/payment-capability:
    post:
      tags: [Public]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentCapability"
      responses:
        "200": { description: OK }

  /quotes/rental:
    post:
      tags: [Public, Quotes]
      summary: Estimasi harga sewa (publik, throttle)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteRentalRequest"
      responses:
        "200": { description: OK }
        "403": { description: Listing tidak ditemukan }
        "422": { description: Tanggal tidak valid }

  /quotes/leasing:
    post:
      tags: [Public, Quotes]
      summary: Estimasi cicilan (alias logic /calculate-installment)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalculatorInstallment"
      responses:
        "200": { description: OK }
        "403": { description: Validasi bisnis }

  /quotes/garage:
    post:
      tags: [Public, Quotes, Garage]
      summary: Estimasi total layanan bengkel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteGarageRequest"
      responses:
        "200": { description: OK }
        "422": { description: Layanan tidak valid untuk bengkel }

  /kata-kata/random:
    get:
      tags: [Public, KataKata]
      summary: Satu kutipan / kata-kata acak (teks)
      parameters:
        - in: query
          name: locale
          schema: { type: string, enum: [id, en] }
          description: Filter bahasa isi kutipan
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [quote]
                properties:
                  quote:
                    $ref: "#/components/schemas/KataKataItem"
        "404": { description: Tidak ada kutipan (mis. daftar kosong atau filter locale) }

  /kata-kata:
    get:
      tags: [Public, KataKata]
      summary: Daftar kutipan / kata-kata (teks)
      parameters:
        - in: query
          name: locale
          schema: { type: string, enum: [id, en] }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [quotes]
                properties:
                  quotes:
                    type: array
                    items:
                      $ref: "#/components/schemas/KataKataItem"

  /guest/service-bookings:
    post:
      tags: [Public, Garage]
      summary: Booking layanan bengkel tanpa JWT (tamu)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuestServiceBooking"
      responses:
        "201": { description: Created }
        "422": { description: Validasi }

  /scan-showroom/{code}:
    post:
      tags: [Public, ShowroomPartner]
      parameters:
        - in: path
          name: code
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }
        "404": { description: Showroom not found }

  /garages:
    get:
      tags: [Public, Garage]
      summary: Daftar bengkel
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: location
          schema: { type: string }
        - in: query
          name: min_rating
          schema: { type: number }
        - in: query
          name: lat
          schema: { type: number }
        - in: query
          name: lng
          schema: { type: number }
        - in: query
          name: radius_km
          schema: { type: number, default: 25 }
      responses:
        "200":
          description: OK

  /garages/{id}:
    get:
      tags: [Public, Garage]
      summary: Detail bengkel + layanan aktif
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
        "404":
          description: Not found

  /communities:
    get:
      tags: [Public, Community]
      summary: Daftar komunitas
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: location
          schema: { type: string }
      responses:
        "200":
          description: OK

  /communities/{slug}:
    get:
      tags: [Public, Community]
      summary: Detail komunitas
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
        "404":
          description: Not found

  /store-login:
    post:
      tags: [Auth]
      summary: Login (JWT)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, g-recaptcha-response]
              properties:
                email: { type: string, format: email }
                password: { type: string }
                "g-recaptcha-response": { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token: { type: string }
                  token_type: { type: string, example: bearer }
                  expires_in: { type: integer }
                  user: { type: object, additionalProperties: true }
                  user_type: { type: string, enum: [user, dealer, mediator, marketing] }
        "401":
          description: Unauthorized
        "403":
          description: Captcha / akun tidak aktif / email belum verifikasi

  /store-login-mobile:
    post:
      tags: [Auth]
      summary: Login mobile (JWT + indikator admin)
      description: >
        Login untuk mobile app. Payload sama dengan `/store-login`, namun response
        menambahkan field `is_admin` berdasarkan keberadaan email di tabel `admins`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, g-recaptcha-response]
              properties:
                email: { type: string, format: email }
                password: { type: string }
                "g-recaptcha-response": { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token: { type: string }
                  token_type: { type: string, example: bearer }
                  expires_in: { type: integer }
                  user: { type: object, additionalProperties: true }
                  user_type: { type: string, enum: [user, dealer, mediator, marketing] }
                  is_admin:
                    type: boolean
                    description: true jika email juga ada pada tabel admins
        "401":
          description: Unauthorized
        "403":
          description: Captcha / akun tidak aktif / email belum verifikasi

  /store-register:
    post:
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBuyer"
      responses:
        "200": { description: OK }

  /seller/store-register:
    post:
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterSeller"
      responses:
        "200": { description: OK }

  /garage/store-register:
    post:
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterGarage"
      responses:
        "200": { description: OK }

  /mediator/store-register:
    post:
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterMediator"
      responses:
        "200": { description: OK }

  /sales/store-register:
    post:
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterSales"
      responses:
        "200": { description: OK }

  /resend-register:
    post:
